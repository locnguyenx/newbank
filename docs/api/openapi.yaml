components:
  schemas:
    MfaRequest:
      type: object
      required:
      - code
      properties:
        code:
          type: string
    MfaEnrollResponse:
      type: object
      properties:
        secret:
          type: string
        qrCodeUrl:
          type: string
    ProductSegmentRequest:
      required:
      - customerTypes
      type: object
      properties:
        customerTypes:
          type: array
          items:
            type: string
            enum:
            - CORPORATE
            - SME
            - INDIVIDUAL
    ProductCustomerSegmentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        customerType:
          type: string
          enum:
          - CORPORATE
          - SME
          - INDIVIDUAL
    ProductFeeEntryRequest:
      required:
      - calculationMethod
      - currency
      - feeType
      type: object
      properties:
        feeType:
          type: string
        calculationMethod:
          type: string
          enum:
          - FLAT
          - PERCENTAGE
          - TIERED_VOLUME
        amount:
          type: number
        rate:
          type: number
        currency:
          maxLength: 3
          minLength: 0
          type: string
        tiers:
          type: array
          items:
            $ref: '#/components/schemas/ProductFeeTierRequest'
    ProductFeeTierRequest:
      required:
      - rate
      - tierFrom
      type: object
      properties:
        tierFrom:
          type: integer
          format: int64
        tierTo:
          type: integer
          format: int64
        rate:
          type: number
    ProductFeeEntryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        feeType:
          type: string
        calculationMethod:
          type: string
        amount:
          type: number
        rate:
          type: number
        currency:
          type: string
        tiers:
          type: array
          items:
            $ref: '#/components/schemas/ProductFeeTierResponse'
    ProductFeeTierResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        tierFrom:
          type: integer
          format: int64
        tierTo:
          type: integer
          format: int64
        rate:
          type: number
    ProductFeatureRequest:
      required:
      - featureKey
      - featureValue
      type: object
      properties:
        featureKey:
          type: string
        featureValue:
          type: string
    ProductFeatureResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        featureKey:
          type: string
        featureValue:
          type: string
    UpdateProductRequest:
      type: object
      properties:
        code:
          type: string
        name:
          maxLength: 200
          minLength: 0
          type: string
        description:
          type: string
        customerTypes:
          type: array
          items:
            type: string
            enum:
            - CORPORATE
            - SME
            - INDIVIDUAL
    ProductResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        name:
          type: string
        family:
          type: string
        status:
          type: string
        versionNumber:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
