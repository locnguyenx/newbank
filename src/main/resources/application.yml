spring:
  application:
    name: customer-module
  profiles:
    active: dev
  main:
    allow-bean-definition-overriding: true

  # Dev profile - uses PostgreSQL with test data
  datasource:
    url: jdbc:postgresql://localhost:5432/testdb
    username: testuser
    password: testpass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-on-validation-error: true
    clean-disabled: false

server:
  port: 8080

logging:
  level:
    com.banking: INFO
    org.springframework: INFO

jwt:
  secret: "your-256-bit-secret-key-here-change-in-production"
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

spring.kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  consumer:
    group-id: banking-consumer
    auto-offset-reset: earliest
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    properties:
      spring.json.trusted.packages: com.banking.*
